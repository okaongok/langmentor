version: '3.8'

services:
  # 基础设施
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: langmentor-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: langmentor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: langmentor-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: langmentor_db
      MYSQL_USER: langmentor_user
      MYSQL_PASSWORD: langmentor_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: langmentor-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False

  # 后端服务
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: langmentor-api-gateway
    ports:
      - "8080:8000"
    environment:
      - SERVICE_NAME=api-gateway
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=mysql+pymysql://langmentor_user:langmentor_pass@mysql:3306/langmentor_db
      - RAG_SERVICE_URL=http://rag-service:8000
      - LLM_SERVICE_URL=http://llm-service:8000
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  rag-service:
    build:
      context: ./backend
      dockerfile: rag-service/Dockerfile
    container_name: langmentor-rag-service
    ports:
      - "8081:8000"
    environment:
      - SERVICE_NAME=rag-service
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - DATABASE_URL=mysql+pymysql://langmentor_user:langmentor_pass@mysql:3306/langmentor_db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      chroma:
        condition: service_started
    restart: unless-stopped

  llm-service:
    build:
      context: ./backend
      dockerfile: llm-service/Dockerfile
    container_name: langmentor-llm-service
    ports:
      - "8082:8000"
    environment:
      - SERVICE_NAME=llm-service
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_URL=mysql+pymysql://langmentor_user:langmentor_pass@mysql:3306/langmentor_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: celery-worker/Dockerfile
    container_name: langmentor-celery-worker
    environment:
      - CELERY_BROKER_URL=amqp://admin:admin123@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_URL=mysql+pymysql://langmentor_user:langmentor_pass@mysql:3306/langmentor_db
      - RAG_SERVICE_URL=http://rag-service:8000
      - LLM_SERVICE_URL=http://llm-service:8000
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  celery-flower:
    build:
      context: ./backend
      dockerfile: celery-worker/Dockerfile
    container_name: langmentor-celery-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://admin:admin123@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - celery-worker
    command: celery -A celery_worker.tasks flower --port=5555
    restart: unless-stopped

  # 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: langmentor-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
  mysql_data:
  chroma_data:
